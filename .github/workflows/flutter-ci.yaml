name: Flutter CI

on:
  push:
    branches: 
      - "main"
    paths:
      - "wattwise_app/**"
  pull_request:
    branches: 
      - "main"
    paths:
      - "wattwise_app/**"

jobs:
  flutter-analyze-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: wattwise_app

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
        working-directory: wattwise_app

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        working-directory: wattwise_app

      - name: Run Flutter tests
        run: flutter test
        working-directory: wattwise_app

      - name: Build release APK
        run: flutter build apk --release
        working-directory: wattwise_app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: wattwise_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
